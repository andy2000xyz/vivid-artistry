<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN STUDIO · Private Archive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Helvetica Neue', 'Inter', sans-serif;
            background: #08080c;
            color: #f0ece4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 60px 24px 40px;
            text-align: center;
        }
        .brand {
            font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #d4a84b;
            margin-bottom: 12px;
        }
        h1 {
            font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            line-height: 1.25;
            color: #ffffff;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 13px;
            color: #888899;
            line-height: 1.6;
            margin-bottom: 48px;
        }
        .lang-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 48px;
        }
        .lang-btn {
            display: block;
            padding: 20px 16px;
            border: 1px solid #2a2a3a;
            border-radius: 4px;
            background: transparent;
            color: #f0ece4;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.06em;
            transition: all 0.25s;
            text-align: center;
        }
        .lang-btn:hover {
            border-color: #d4a84b;
            background: rgba(212, 168, 75, 0.06);
            transform: translateY(-1px);
        }
        .lang-btn .label {
            font-size: 17px;
            font-weight: 500;
            display: block;
            margin-bottom: 2px;
        }
        .lang-btn .desc {
            font-size: 10px;
            color: #666677;
            letter-spacing: 0.05em;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #2a2a3a;
            margin: 0 auto 32px;
        }
        .bot-link {
            display: inline-block;
            font-size: 11px;
            color: #888899;
            text-decoration: none;
            letter-spacing: 0.12em;
            border: 1px solid #2a2a3a;
            padding: 10px 24px;
            border-radius: 4px;
            transition: all 0.25s;
        }
        .bot-link:hover {
            border-color: #d4a84b;
            color: #d4a84b;
        }
        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444455;
            letter-spacing: 0.1em;
        }
        @media (max-width: 480px) {
            .container { padding: 40px 20px 32px; }
            h1 { font-size: 24px; }
            .lang-btn { padding: 16px 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">VIVIAN STUDIO</div>
        <h1>Private Archive</h1>
        <p class="subtitle">Exclusive digital publications.<br>Preview before subscribing.</p>

        <div class="lang-grid">
            <a href="preview/preview_zh.html" class="lang-btn" target="_blank">
                <span class="label">中文版</span>
                <span class="desc">Editorial</span>
            </a>
            <a href="preview/preview_en.html" class="lang-btn" target="_blank">
                <span class="label">English</span>
                <span class="desc">Dark Luxury</span>
            </a>
            <a href="preview/preview_ja.html" class="lang-btn" target="_blank">
                <span class="label">日本語</span>
                <span class="desc">和風 Wafu</span>
            </a>
            <a href="preview/preview_ko.html" class="lang-btn" target="_blank">
                <span class="label">한국어</span>
                <span class="desc">Minimal</span>
            </a>
        </div>

        <div class="divider"></div>

        <p style="font-size:11px; color:#888899; margin-bottom:20px;">
            Subscribe via Telegram to unlock full editions
        </p>
        <a href="https://t.me/VividArtistry_bot" class="bot-link" target="_blank">Open in Telegram →</a>

        <div class="footer">© 2026 VIVIAN STUDIO</div>
    </div>
</body>
</html>
