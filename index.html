<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIAN STUDIO · Private Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
            background: #08080c;
            color: #f0ece4;
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 24px 40px;
        }
        .brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #d4a84b;
            margin-bottom: 8px;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 36px;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 14px;
            color: #888899;
            line-height: 1.6;
            margin-bottom: 56px;
            max-width: 520px;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #2a2a3a;
            margin-bottom: 56px;
        }

        /* Edition Grid */
        .edition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
            margin-bottom: 64px;
        }
        .edition-card {
            background: #0e0e14;
            border: 1px solid #1e1e2e;
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .edition-card:hover {
            border-color: #d4a84b;
            transform: translateY(-2px);
        }
        .edition-card .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            background: #12121a;
        }
        .edition-card .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .edition-card:hover .cover-wrap img {
            transform: scale(1.03);
        }
        .edition-card .badge {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: #ffffff;
            background: rgba(212, 168, 75, 0.85);
            padding: 4px 12px;
            border-radius: 3px;
            text-transform: uppercase;
        }
        .edition-card .body {
            padding: 20px;
        }
        .edition-card .edition-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 22px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .edition-card .edition-sub {
            font-size: 13px;
            color: #888899;
            margin-bottom: 16px;
        }
        .edition-card .lang-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .edition-card .lang-links a {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-decoration: none;
            color: #f0ece4;
            border: 1px solid #2a2a3a;
            padding: 6px 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .edition-card .lang-links a:hover {
            border-color: #d4a84b;
            color: #d4a84b;
            background: rgba(212, 168, 75, 0.06);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: #666677;
        }
        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #1a1a2a;
            font-size: 10px;
            color: #444455;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer a {
            color: #666677;
            text-decoration: none;
        }
        .footer a:hover {
            color: #d4a84b;
        }

        @media (max-width: 600px) {
            .container { padding: 36px 16px 24px; }
            h1 { font-size: 28px; }
            .edition-grid { gap: 24px; }
            .footer { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">VIVIAN STUDIO</div>
        <h1>Private Archive</h1>
        <p class="subtitle">
            Every edition is a numbered collection. Preview before subscribing.
        </p>

        <div class="divider"></div>

        <div class="edition-grid" id="editionGrid">
            <!-- Editions rendered by JS from editionData -->
        </div>

        <div class="footer">
            <span>© 2026 VIVIAN STUDIO</span>
            <a href="https://t.me/VividArtistry_bot" target="_blank">Telegram →</a>
        </div>
    </div>

    <script>
        const editionData = [
            {
                number: "Vol.1",
                title: "Summer Dream",
                subtitle: "First formal edition · 4 languages",
                cover: "assets/covers/vol1_thumb.jpg",
                link: "editions/vol1/",
                langs: [
                    { code: "zh", label: "中文版", desc: "Editorial" },
                    { code: "en", label: "English", desc: "Dark Luxury" },
                    { code: "ja", label: "日本語", desc: "和風 Wafu" },
                    { code: "ko", label: "한국어", desc: "Minimal" },
                ]
            }
        ];

        function renderGallery() {
            const grid = document.getElementById('editionGrid');
            if (!editionData.length) {
                grid.innerHTML = '<div class="empty-state"><p>No editions yet.<br>Coming soon.</p></div>';
                return;
            }
            grid.innerHTML = editionData.map(ed => {
                const langLinks = ed.langs.map(l =>
                    `<a href="${ed.link}${l.code}.html" target="_blank">${l.label}</a>`
                ).join('');
                return `
                    <div class="edition-card">
                        <a href="${ed.link}" class="cover-wrap">
                            <img src="${ed.cover}" alt="${ed.title}" loading="lazy">
                            <div class="badge">${ed.number}</div>
                        </a>
                        <div class="body">
                            <div class="edition-title">${ed.title}</div>
                            <div class="edition-sub">${ed.subtitle}</div>
                            <div class="lang-links">${langLinks}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        renderGallery();
    </script>
</body>
</html>
