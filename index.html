<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVIAN STUDIO · Private Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
  background: #06060a;
  color: #f0ece4;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HERO — FULL VIEWPORT ─── */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #06060a;
}

/* ─── VIDEO — FILLS VIEWPORT HEIGHT ─── */
.video-wrapper {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.video-wrapper video {
  height: 100vh;
  height: 100dvh;
  width: auto;
  display: block;
  background: #06060a;
}

/* poster overlay */
.poster-overlay {
  position: absolute;
  inset: 0;
  background-size: auto 100vh;
  background-size: auto 100dvh;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.6s;
  z-index: 2;
  pointer-events: none;
}

.poster-overlay.hidden {
  opacity: 0;
}

/* ─── TOP OVERLAY: brand + title ─── */
.hero-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 5;
  padding: 40px 32px 60px;
  background: linear-gradient(180deg, rgba(6,6,10,0.7) 0%, transparent 100%);
  pointer-events: none;
  text-align: center;
}

.brand {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #d4a84b;
  margin-bottom: 2px;
}

.title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 24px;
  font-weight: 400;
  color: #ffffff;
}

/* ─── PLAY BUTTON ─── */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4;
  width: 80px;
  height: 80px;
  border: 2px solid rgba(240,236,228,0.5);
  border-radius: 50%;
  background: rgba(6,6,10,0.4);
  backdrop-filter: blur(6px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s;
}

.play-btn:hover {
  border-color: #d4a84b;
  background: rgba(212,168,75,0.15);
  transform: translate(-50%, -50%) scale(1.06);
}

.play-btn svg {
  width: 26px;
  height: 26px;
  fill: #f0ece4;
  margin-left: 4px;
  transition: fill 0.3s;
}

.play-btn:hover svg { fill: #d4a84b; }
.play-btn.playing { opacity: 0; pointer-events: none; }

/* ─── BOTTOM CONTROLS ─── */
.video-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 4;
  padding: 50px 20px 16px;
  background: linear-gradient(transparent, rgba(6,6,10,0.6));
  opacity: 0;
  transition: opacity 0.4s;
}

.video-wrapper:hover .video-controls,
.video-controls.active { opacity: 1; }

.control-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 700px;
  margin: 0 auto;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: rgba(240,236,228,0.12);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #d4a84b;
  border-radius: 2px;
  transition: width 0.1s linear;
}

.ctrl-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: rgba(240,236,228,0.6);
  display: flex;
  align-items: center;
  transition: color 0.2s;
  font-family: 'Inter', sans-serif;
}

.ctrl-btn:hover { color: #d4a84b; }
.ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

.time-display {
  font-size: 11px;
  color: rgba(240,236,228,0.4);
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.05em;
  min-width: 36px;
  font-variant-numeric: tabular-nums;
}

/* ─── SCROLL HINT ─── */
.scroll-hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: rgba(240,236,228,0.25);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  animation: pulse-down 2.5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes pulse-down {
  0%, 100% { opacity: 0.25; transform: translateX(-50%) translateY(0); }
  50% { opacity: 0.7; transform: translateX(-50%) translateY(4px); }
}

.scroll-hint .arrow {
  width: 1px;
  height: 24px;
  background: linear-gradient(rgba(240,236,228,0.25), transparent);
}

/* ─── PORTAL ─── */
.portal {
  padding: 80px 24px 60px;
  text-align: center;
  background: #06060a;
}

.portal-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #d4a84b, transparent);
  margin: 0 auto 32px;
}

.portal h2 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #888899;
  margin-bottom: 32px;
}

.lang-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.lang-link {
  display: block;
  padding: 16px 28px;
  border: 1px solid #2a2a3a;
  border-radius: 4px;
  background: transparent;
  color: #f0ece4;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.06em;
  transition: all 0.3s;
  min-width: 120px;
}

.lang-link:hover {
  border-color: #d4a84b;
  background: rgba(212,168,75,0.06);
  transform: translateY(-2px);
}

.lang-link .native {
  font-size: 18px;
  font-weight: 500;
  display: block;
  margin-bottom: 1px;
}

.lang-link .desc {
  font-size: 10px;
  color: #666677;
}

.tg-section {
  margin-top: 40px;
}

.tg-section p {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 13px;
  color: #888899;
  margin-bottom: 16px;
}

.tg-link {
  display: inline-block;
  font-size: 10px;
  color: #888899;
  text-decoration: none;
  letter-spacing: 0.15em;
  border: 1px solid #2a2a3a;
  padding: 10px 24px;
  border-radius: 4px;
  transition: all 0.3s;
}

.tg-link:hover {
  border-color: #d4a84b;
  color: #d4a84b;
}

.footer {
  margin-top: 60px;
  font-size: 9px;
  color: #444455;
  letter-spacing: 0.1em;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .hero-top { padding: 28px 20px 50px; }
  .title { font-size: 20px; }
  .play-btn { width: 64px; height: 64px; }
  .play-btn svg { width: 20px; height: 20px; }
  .video-controls { padding: 40px 14px 12px; }
  .portal { padding: 60px 16px 40px; }
  .lang-link { min-width: 100px; padding: 14px 20px; }
  .lang-link .native { font-size: 16px; }
}

@media (min-width: 1600px) {
  .hero-top { padding: 52px 48px 80px; }
  .title { font-size: 28px; }
  .play-btn { width: 96px; height: 96px; }
  .play-btn svg { width: 30px; height: 30px; }
}
</style>
</head>
<body>

<!-- ─── HERO ─── -->
<section class="hero">
  <!-- brand/title overlay -->
  <div class="hero-top">
    <div class="brand">VIVIAN STUDIO</div>
    <h1 class="title">Private Archive</h1>
  </div>

  <div class="video-wrapper" id="player">
    <video id="introVideo" preload="metadata" playsinline
           poster="/poster.jpg">
      <source src="/video/intro.mp4" type="video/mp4">
    </video>

    <!-- poster overlay -->
    <div class="poster-overlay" id="posterOverlay" style="background-image:url(/poster.jpg)"></div>

    <!-- play button -->
    <button class="play-btn" id="playBtn" aria-label="Play introduction">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <!-- controls -->
    <div class="video-controls" id="controls">
      <div class="control-bar">
        <button class="ctrl-btn" id="pauseBtn" aria-label="Pause">
          <svg viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
        </button>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-display" id="timeDisplay">0:00</span>
      </div>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>
</section>

<!-- ─── PORTAL ─── -->
<section class="portal">
  <div class="portal-divider"></div>
  <h2>Enter the Archive</h2>

  <div class="lang-row">
    <a href="/zh/" class="lang-link">
      <span class="native">中文版</span>
      <span class="desc">作品集</span>
    </a>
    <a href="/en/" class="lang-link">
      <span class="native">English</span>
      <span class="desc">Editions</span>
    </a>
    <a href="/ja/" class="lang-link">
      <span class="native">日本語</span>
      <span class="desc">作品集</span>
    </a>
    <a href="/ko/" class="lang-link">
      <span class="native">한국어</span>
      <span class="desc">에디션</span>
    </a>
  </div>

  <div class="tg-section">
    <p>Subscribe to unlock full editions</p>
    <a href="https://t.me/VividArtistry_bot" class="tg-link" target="_blank">Open in Telegram →</a>
  </div>

  <div class="footer">© 2026 VIVIAN STUDIO · Private Archive</div>
</section>

<script>
(function(){
  const video = document.getElementById('introVideo');
  const wrapper = document.getElementById('player');
  const playBtn = document.getElementById('playBtn');
  const posterOverlay = document.getElementById('posterOverlay');
  const controls = document.getElementById('controls');
  const pauseBtn = document.getElementById('pauseBtn');
  const progressFill = document.getElementById('progressFill');
  const progressTrack = document.getElementById('progressTrack');
  const timeDisplay = document.getElementById('timeDisplay');

  function fmt(t) {
    if (!t || !isFinite(t)) return '0:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function updateProgress() {
    if (!video.duration) return;
    progressFill.style.width = ((video.currentTime / video.duration) * 100) + '%';
    timeDisplay.textContent = fmt(video.currentTime);
  }

  function startPlay() {
    video.play();
    playBtn.classList.add('playing');
    posterOverlay.classList.add('hidden');
    controls.classList.add('active');
  }

  function pausePlay() {
    video.pause();
    controls.classList.add('active');
  }

  playBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (video.paused) startPlay(); else pausePlay();
  });

  wrapper.addEventListener('click', function(e) {
    if (e.target.closest('.ctrl-btn') || e.target.closest('.progress-track')) return;
    if (video.paused) startPlay(); else pausePlay();
  });

  pauseBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    pausePlay();
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  });

  video.addEventListener('play', function() {
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';
  });

  video.addEventListener('pause', function() {
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    if (video.currentTime > 0) controls.classList.add('active');
  });

  video.addEventListener('timeupdate', updateProgress);

  video.addEventListener('ended', function() {
    playBtn.classList.remove('playing');
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  });

  progressTrack.addEventListener('click', function(e) {
    const rect = progressTrack.getBoundingClientRect();
    video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
  });

  let controlsTimer;
  wrapper.addEventListener('mousemove', function() {
    if (!video.paused) {
      controls.classList.add('active');
      clearTimeout(controlsTimer);
      controlsTimer = setTimeout(function() { controls.classList.remove('active'); }, 3000);
    }
  });
  wrapper.addEventListener('mouseleave', function() {
    if (!video.paused) { clearTimeout(controlsTimer); controls.classList.remove('active'); }
  });

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') { e.preventDefault(); if (video.paused) startPlay(); else pausePlay(); }
  });
})();
</script>

</body>
</html>
