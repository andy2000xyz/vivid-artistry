<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 · VIVIAN STUDIO Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
            background: #08080c;
            color: #f0ece4;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px 40px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #d4a84b;
        }
        .lang-switch {
            font-size: 11px;
            color: #888899;
            text-decoration: none;
            letter-spacing: 0.1em;
            border: 1px solid #2a2a3a;
            padding: 4px 14px;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .lang-switch:hover {
            border-color: #d4a84b;
            color: #d4a84b;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 400;
            color: #ffffff;
            margin-bottom: 8px;
            margin-top: 32px;
        }
        .subtitle {
            font-size: 13px;
            color: #888899;
            margin-bottom: 48px;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #2a2a3a;
            margin-bottom: 40px;
        }
        .edition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .edition-card {
            background: #0e0e14;
            border: 1px solid #1e1e2e;
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .edition-card:hover {
            border-color: #d4a84b;
            transform: translateY(-2px);
        }
        .edition-card .cover {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
            background: #12121a;
        }
        .edition-card .info {
            padding: 14px 16px 16px;
        }
        .edition-card .ed-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 2px;
        }
        .edition-card .ed-sub {
            font-size: 11px;
            color: #777788;
        }
        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444455;
            letter-spacing: 0.1em;
        }
        @media (max-width: 600px) {
            .container { padding: 32px 16px 24px; }
            h1 { font-size: 26px; }
            .edition-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
    </style>
<style>/* image-protect */img{pointer-events:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        .store-section { text-align: center; margin-bottom: 32px; }
        .store-btn {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #06060a;
            background: #d4a84b;
            padding: 14px 36px;
            border-radius: 3px;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .store-btn:hover {
            background: #e8c062;
            transform: translateY(-1px);
        }</style></head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="brand">VIVIAN STUDIO</div>
            <a href="../en/" class="lang-switch">English</a>
        </div>
        <h1>英語作品集</h1>
        <p class="subtitle">プレビュー後、購読で完全版を入手</p>
        <div class="divider"></div>

        <div class="edition-grid" id="gallery"></div>

                <div class="store-section">
            <a href="../purchase/" class="store-btn">Purchase Full Edition · $10 USDT</a>
        </div>

<div class="footer">© 2026 VIVIAN STUDIO</div>
    </div>

    <script src="../js/gallery.js"></script>
    <script>
        const grid = document.getElementById('gallery');
        const lang = 'ja';
        const editions = editionData.map(ed => {
            const cover = `../editions/${ed.id}/cover_thumb.jpg`;
            return `
                <a href="../editions/${ed.id}/${lang}.html" class="edition-card" target="_blank">
                    <img class="cover" src="${cover}" alt="${ed.titles[lang]}" loading="lazy">
                    <div class="info">
                        <div class="ed-title">${ed.titles[lang]}</div>
                        <div class="ed-sub">${ed.subtitle[lang]}</div>
                    </div>
                </a>
            `;
        }).join('');
        grid.innerHTML = editions;
    </script>

<!-- img-protect-js --><script>
(function(){
function p(){
document.querySelectorAll('.page img,.edition-card img').forEach(function(i){
if(i._rp)return;
var s=i.currentSrc||i.src,w=i.naturalWidth,h=i.naturalHeight;
if(!s||!w||!h)return;
i._rp=1;
var d=document.createElement('div');
d.style.backgroundImage='url("'+s.replace(/"/g,'\\"')+'")';
d.style.backgroundSize='contain';
d.style.backgroundPosition='center';
d.style.backgroundRepeat='no-repeat';
d.style.width='100%';
d.style.display='block';
d.style.aspectRatio=w+'/'+h;
d.style.pointerEvents='none';
d.style.userSelect='none';
d.style.webkitTouchCallout='none';
i.parentNode.replaceChild(d,i)
})}
document.addEventListener('DOMContentLoaded',p);
window.addEventListener('load',p);
})();
</script>
</body>
</html>
